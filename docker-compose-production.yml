services:
  flask-app:
    image: bridgerhung/easytest:latest
    pull_policy: always
    restart: always
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY}
      - MAX_CONTENT_LENGTH=${MAX_CONTENT_LENGTH:-20971520}
      - FLASK_DEBUG=0
    ports:
      - "5000:5000" # 將容器內的 5000 映射到主機的 5000
    volumes:
      - ./uploads:/app/uploads
      - ./results:/app/results
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    pids_limit: 256
    mem_limit: 512m
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    # 可選：設置開發模式（移除可避免暴露問題）
